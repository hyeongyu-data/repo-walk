name: Bug
description: 커맨드 동작, gh 연동, 해설 결과의 문제를 보고합니다.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그는 재현 가능한 정보가 가장 중요합니다. 가능하면 같은 절차로 다시 발생시킬 수 있게 작성해 주세요.

  - type: textarea
    id: summary
    attributes:
      label: 현상
      description: 어떤 문제가 발생했는지 간략히 설명해 주세요.
      placeholder: 예) --timeline 모드에서 이슈가 시간순으로 정렬되지 않습니다.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 문제를 다시 확인할 수 있는 절차를 순서대로 적어 주세요.
      placeholder: |
        1. /repo-walk owner/repo --timeline 실행
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 정상적으로 동작했다면 어떤 결과가 나와야 하나요?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로 관찰한 결과를 적어 주세요.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 영향받는 컴포넌트
      multiple: true
      options:
        - 슬래시 커맨드 (commands/repo-walk.md)
        - 플러그인 매니페스트 (plugin.json / marketplace.json)
        - gh 연동 / 데이터 수집
        - 타임라인 정렬 / 스코프 필터
        - 해설(narration) 결과
        - 진행 커서 / 이어보기
        - 문서 (README / AGENTS.md)
        - 기타
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 실행 환경
      description: 대상 저장소, 사용한 옵션, gh 버전, Claude Code 버전을 적어 주세요.
      value: |
        - 대상 repo:
        - 실행 커맨드:
        - gh version:
        - Claude Code version:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 로그
      description: 에러 메시지나 관련 출력을 붙여 주세요.
      render: shell
    validations:
      required: false
