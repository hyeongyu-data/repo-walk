name: Experiment
description: 해설 방식, 순회 단위, 프롬프트 구성 등의 실험을 기록합니다.
title: "[EXP] "
labels: ["experiment"]
body:
  - type: markdown
    attributes:
      value: |
        실험 issue는 가설과 판정 기준을 먼저 정하는 데 목적이 있습니다. 이 플러그인은 커맨드 마크다운(=프롬프트)이 곧 로직이라, "어떤 프롬프트·구성이 더 잘 이해시키나"가 주요 실험 대상입니다. 결과가 나오면 같은 issue에 요약을 남겨 주세요.

  - type: textarea
    id: hypothesis
    attributes:
      label: 가설
      description: 이번 실험으로 검증하려는 가설을 명확하게 적어 주세요.
      placeholder: 예) PR 본문의 `closes #N`을 파싱해 연결 이슈를 함께 보여주면 해설의 인과 정확도가 올라간다.
    validations:
      required: true

  - type: input
    id: target
    attributes:
      label: 실험 대상
      description: 실험할 커맨드 구성, 프롬프트 지시문, 스코프 옵션, gh 호출 방식을 적어 주세요.
      placeholder: 예) commands/repo-walk.md 의 해설 섹션 프롬프트
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 영역
      options:
        - 해설(narration) 품질
        - 순회 단위 (PR / --timeline)
        - 스코프 필터 (--limit / --path / --since)
        - gh 데이터 수집 / 페이징
        - 진행 커서 / 이어보기
        - 토큰 / 속도 / rate limit
        - 기타
    validations:
      required: true

  - type: dropdown
    id: criterion
    attributes:
      label: 주요 판정 기준
      multiple: true
      options:
        - 해설 이해도 향상
        - 인과 설명 정확도 향상
        - 토큰 사용량 절감
        - 실행 속도 향상
        - 대형 저장소 대응력
        - 얇은 래퍼 유지 (복잡도 미증가)
        - 기타
    validations:
      required: true

  - type: textarea
    id: setup
    attributes:
      label: 실험 설정
      description: 변경할 구성, 비교 기준, 관찰 방법을 적어 주세요.
      value: |
        - 변경 구성:
        - 비교 기준(기존 vs 실험):
        - 테스트 대상 저장소:
        - 관찰 방법:
        - 토큰/속도 영향:
    validations:
      required: true

  - type: textarea
    id: result
    attributes:
      label: 결과
      description: 실험 후 관찰 결과와 결론을 업데이트해 주세요.
      value: |
        - 관찰 결과:
        - 결론:
        - 후속 작업:
    validations:
      required: false
